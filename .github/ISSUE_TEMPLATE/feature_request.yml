name: Feature request
description: Suggest an improvement for an official Bight.ts extra package
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: target-package
    attributes:
      label: Target package
      description: Which package should change?
      placeholder: "@bight-ts/settings"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: fit
    attributes:
      label: Why it belongs here
      description: Explain why this should live in an official extra instead of app code or core.
