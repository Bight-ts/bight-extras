name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: extras-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  release:
    runs-on: ubuntu-latest
    needs: validate
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: npm install -g npm@^11.10.0
      - run: npm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify npm token is present
        run: node -e "const token = process.env.NPM_TOKEN ?? ''; if (!token) { throw new Error('NPM_TOKEN is missing.'); } console.log(`NPM_TOKEN detected (${token.length} chars).`);"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Check npm auth identity
        run: npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Check npm registry connectivity
        run: npm ping
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Check published core visibility
        run: npm view @bight-ts/core version
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: changesets/action@v1
        with:
          commit: "chore: release packages"
          title: "chore: release packages"
          version: pnpm version-packages
          publish: pnpm release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
